<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudio de Karaoke - Vecinos Virtuales</title>
    <script src="https://jsdelivr.net"></script>
    <link href="https://cloudflare.com" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background: #0f0c1b; color: white; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 90%; max-width: 500px; padding: 1.5rem 0; text-align: center; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
        .btn-back { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 0.5rem 1rem; border-radius: 50px; text-decoration: none; font-size: 0.85rem; font-weight: bold; }
        .title { font-size: 1.3rem; margin: 0; font-weight: bold; color: #a855f7; display: flex; align-items: center; gap: 0.5rem; }
        .search-box { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; background: rgba(255,255,255,0.05); padding: 0.5rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .search-box input { flex: 1; background: transparent; border: none; color: white; padding: 0.5rem; font-size: 0.9rem; outline: none; }
        .search-box button { background: #a855f7; border: none; color: white; padding: 0.5rem 1.2rem; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .status-msg { background: rgba(234, 179, 8, 0.15); border: 1px solid #eab308; color: #fde047; padding: 0.75rem; border-radius: 10px; font-size: 0.8rem; line-height: 1.4; display: none; margin-bottom: 1rem; text-align: left; }
        .player-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 16px; overflow: hidden; margin-bottom: 1.5rem; box-shadow: 0 8px 24px rgba(0,0,0,0.5); display: none; border: 2px solid #a855f7; }
        .results-list { display: flex; flex-direction: column; gap: 0.75rem; text-align: left; }
        .track-item { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 0.75rem; border-radius: 12px; display: flex; align-items: center; gap: 0.75rem; cursor: pointer; transition: 0.2s; }
        .track-item:hover { background: rgba(168, 85, 247, 0.2); border-color: #a855f7; }
        .track-thumb { width: 60px; aspect-ratio: 16/9; background: #221a36; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .track-info { flex: 1; }
        .track-title { font-size: 0.85rem; font-weight: bold; margin-bottom: 2px; }
        .track-genre { font-size: 0.7rem; color: #a855f7; text-transform: uppercase; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html#dashboard" class="btn-back"><i class="fas fa-arrow-left"></i> Volver</a>
            <h2 class="title">🎤 Estudio Karaoke</h2>
            <div style="font-size: 1.2rem;">👨‍🎤</div>
        </div>

        <div id="status-box" class="status-msg"></div>

        <div class="search-box">
            <input type="text" id="search-input" placeholder="Buscar artista, folclore o clásicos de Karaoke...">
            <button onclick="buscarCancion()">Buscar</button>
        </div>

        <div id="wrapper-video" class="player-wrapper">
            <div id="player-iframe" style="width: 100%; height: 100%;"></div>
        </div>

        <div id="results" class="results-list"></div>
    </div>

    <script>
        // ============================================================
        // CONFIGURACIÓN DE APIS Y CATÁLOGO DE RESPALDO LOCAL
        // ============================================================
        
        // 🔑 TU LLAVE DE GOOGLE: Déjala en blanco para usar catálogo o pega tu API real para búsqueda libre
        const YOUTUBE_API_KEY = ""; 

        // 🎵 ALMACÉN COMERCIAL DE CANCIONES (Videos reales listos para cantar)
        const CATALOGO_LOCAL = [
            { id: "M7X9XyVfSgA", title: "Chaqueño Palavecino - Amor Salvaje (Karaoke)", genre: "folclore" },
            { id: "eK9W34Y2wM8", title: "Los Nocheros - Entre la Tierra y el Cielo (Karaoke)", genre: "folclore" },
            { id: "XW5U8pWJqK4", title: "Soda Stereo - De Música Ligera (Karaoke con Coros)", genre: "rock" },
            { id: "3wVw86mI6N0", title: "Gilda - No me arrepiento de este amor (Karaoke)", genre: "cumbia" },
            { id: "98mO_V_W8z4", title: "Mercedes Sosa - Luna Tucumana (Letra / Instrumental)", genre: "folclore" },
            { id: "P7mR34xWq88", title: "Rodrigo - Ocho Cuarenta (Karaoke Espectáculo)", genre: "cuarteto" }
        ];

        let ytPlayer = null;
        let motorSincronizado = false;

        // Iniciar la carga de la API oficial de YouTube
        (function() {
            const tag = document.createElement('script');
            tag.src = "https://youtube.com";
            const firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
        })();

        function onYouTubeIframeAPIReady() {
            motorSincronizado = true;
            console.log("✅ Motor de reproducción de YouTube acoplado");
        }
        // ============================================================
        // LÓGICA DE BÚSQUEDA INTELIGENTE DUAL
        // ============================================================
        function buscarCancion() {
            const input = document.getElementById('search-input');
            const consulta = input.value.trim().toLowerCase();
            const statusBox = document.getElementById('status-box');
            const contenedorResultados = document.getElementById('results');

            if (!consulta) return;

            statusBox.style.display = "none";
            contenedorResultados.innerHTML = "";

            // 🛡️ CONTROL DE SINCRONIZACIÓN
            if (!motorSincronizado) {
                statusBox.innerText = "El motor de YouTube se está sincronizando en segundo plano. Espera 3 segundos e intenta de nuevo.";
                statusBox.style.display = "block";
                return;
            }

            // CASO A: SI NO TIENES CLAVE REAL, DISPARA EL MOTOR DE ALMACÉN LOCAL
            if (!YOUTUBE_API_KEY) {
                console.log("🔍 Rastreando catálogo local...");
                const filtradas = CATALOGO_LOCAL.filter(c => 
                    c.title.toLowerCase().includes(consulta) || 
                    c.genre.toLowerCase().includes(consulta)
                );

                if (filtradas.length > 0) {
                    renderizarResultados(filtradas);
                } else {
                    // Si busca algo que no está, le regalamos todo el catálogo para que elija
                    statusBox.innerText = "No encontramos coincidencias exactas. Te mostramos los clásicos disponibles para cantar:";
                    statusBox.style.display = "block";
                    renderizarResultados(CATALOGO_LOCAL);
                }
            } else {
                // CASO B: CONEXIÓN LIBRE A GOOGLE YOUTUBE
                fetch(`https://googleapis.com{encodeURIComponent(consulta + " karaoke")}&type=video&key=${YOUTUBE_API_KEY}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.items && data.items.length > 0) {
                            const formateadas = data.items.map(item => ({
                                id: item.id.videoId,
                                title: item.snippet.title,
                                genre: "YouTube Live"
                            }));
                            renderizarResultados(formateadas);
                        } else {
                            renderizarResultados(CATALOGO_LOCAL);
                        }
                    })
                    .catch(err => {
                        console.error("Error en API YouTube, cargando respaldo local:", err);
                        renderizarResultados(CATALOGO_LOCAL);
                    });
            }
        }

        function renderizarResultados(lista) {
            const contenedor = document.getElementById('results');
            contenedor.innerHTML = lista.map(track => `
                <div class="track-item" onclick="cargarVideo('${track.id}')">
                    <div class="track-thumb">🎵</div>
                    <div class="track-info">
                        <div class="track-title">${track.title}</div>
                        <div class="track-genre">${track.genre}</div>
                    </div>
                    <div style="color: #a855f7; font-size: 0.9rem;"><i class="fas fa-play"></i></div>
                </div>
            `).join('');
        }

        // ============================================================
        // INYECCIÓN DE VIDEO Y CONTROL REPRODUCTOR
        // ============================================================
        function cargarVideo(videoId) {
            const wrapper = document.getElementById('wrapper-video');
            wrapper.style.display = 'block';
            
            // Subir la pantalla suavemente para ver el reproductor
            window.scrollTo({ top: 0, behavior: 'smooth' });

            if (ytPlayer) {
                ytPlayer.loadVideoById(videoId);
            } else {
                ytPlayer = new YT.Player('player-iframe', {
                    videoId: videoId,
                    playerVars: {
                        'autoplay': 1,
                        'modestbranding': 1,
                        'rel': 0
                    },
                    events: {
                        'onReady': (e) => e.target.playVideo()
                    }
                });
            }
        }
    </script>
</body>
</html>
