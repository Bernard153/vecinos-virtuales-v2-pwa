<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudio de Karaoke Pro - Vecinos Virtuales</title>
    <link href="https://cloudflare.com" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background: #0f0c1b; color: white; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 90%; max-width: 500px; padding: 1.5rem 0; text-align: center; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
        .btn-back { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 0.5rem 1rem; border-radius: 50px; text-decoration: none; font-size: 0.85rem; font-weight: bold; }
        .title { font-size: 1.3rem; margin: 0; font-weight: bold; color: #a855f7; display: flex; align-items: center; gap: 0.5rem; }
        .search-box { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; background: rgba(255,255,255,0.05); padding: 0.5rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .search-box input { flex: 1; background: transparent; border: none; color: white; padding: 0.5rem; font-size: 0.9rem; outline: none; }
        .search-box button { background: #a855f7; border: none; color: white; padding: 0.5rem 1.2rem; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .status-msg { background: rgba(234, 179, 8, 0.15); border: 1px solid #eab308; color: #fde047; padding: 0.75rem; border-radius: 10px; font-size: 0.8rem; line-height: 1.4; display: none; margin-bottom: 1rem; text-align: left; }
        .player-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 16px; overflow: hidden; margin-bottom: 1.25rem; box-shadow: 0 8px 24px rgba(0,0,0,0.5); display: none; border: 2px solid #a855f7; }
        .studio-console { background: linear-gradient(145deg, #1e1b4b, #111827); border: 2px solid #a855f7; border-radius: 16px; padding: 1.25rem; margin-bottom: 1.5rem; display: none; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .rec-btn { background: #ef4444; border: none; color: white; width: 60px; height: 60px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); transition: 0.2s; margin: 0 0.5rem; }
        .rec-btn.recording { background: #22c55e; box-shadow: 0 0 20px rgba(34, 197, 94, 0.6); animation: pulse 1.5s infinite; }
        .audio-preview { width: 100%; margin-top: 1rem; border-radius: 8px; display: none; }
        .download-link { display: inline-flex; align-items: center; gap: 0.5rem; background: #3b82f6; color: white; text-decoration: none; padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.85rem; font-weight: bold; margin-top: 0.75rem; display: none; }
        .eq-loader { display: none; align-items: flex-end; justify-content: center; gap: 4px; height: 30px; margin: 0.75rem 0; }
        .eq-bar { width: 4px; height: 5px; background: #a855f7; border-radius: 2px; }
        .recording .eq-bar { animation: bounce 0.8s ease-in-out infinite alternate; }
        .recording .eq-bar:nth-child(2) { animation-delay: 0.2s; background: #c084fc; }
        .recording .eq-bar:nth-child(3) { animation-delay: 0.4s; background: #e9d5ff; }
        .recording .eq-bar:nth-child(4) { animation-delay: 0.1s; background: #c084fc; }
        @keyframes bounce { 100% { height: 30px; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .results-list { display: flex; flex-direction: column; gap: 0.75rem; text-align: left; }
        .track-item { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 0.75rem; border-radius: 12px; display: flex; align-items: center; gap: 0.75rem; cursor: pointer; transition: 0.2s; }
        .track-item:hover { background: rgba(168, 85, 247, 0.2); border-color: #a855f7; }
        .track-thumb { width: 60px; aspect-ratio: 16/9; background: #221a36; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .track-info { flex: 1; }
        .track-title { font-size: 0.85rem; font-weight: bold; margin-bottom: 2px; }
        .track-genre { font-size: 0.7rem; color: #a855f7; text-transform: uppercase; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html#dashboard" class="btn-back"><i class="fas fa-arrow-left"></i> Volver</a>
            <h2 class="title">🎤 Estudio Karaoke Pro</h2>
            <div style="font-size: 1.2rem;">👨‍🎤</div>
        </div>

        <div id="status-box" class="status-msg"></div>

        <!-- 🔄 ACTUALIZACIÓN DE INTERRUPTOR: Llama a la nueva función inmune al caché -->
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Buscar artista, rock, folclore o cumbia...">
            <button onclick="ejecutarBusquedaOficial()">Buscar</button>
        </div>

        <div id="wrapper-video" class="player-wrapper">
            <iframe id="player-iframe" style="width: 100%; height: 100%; border: none;" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>

        <div id="studio-console" class="studio-console">
            <div id="console-title" style="font-size: 0.9rem; font-weight: bold; color: #e9d5ff; margin-bottom: 0.5rem;">Estudio de Grabación Listo</div>
            <div id="eq-loader" class="eq-loader">
                <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
            </div>
            <button id="rec-btn" class="rec-btn" onclick="toggleGrabacion()"><i class="fas fa-microphone"></i></button>
            <div style="margin-top: 0.5rem; font-size: 0.75rem; color: #9ca3af;" id="rec-status">Haz clic para empezar a grabar tu voz</div>
            <audio id="audio-preview" class="audio-preview" controls></audio>
            <a id="download-link" class="download-link" href="#"><i class="fas fa-download"></i> Guardar mi Canción 💾</a>
        </div>

        <div id="results" class="results-list"></div>
    </div>
    <script>
        // 🔑 TU LLAVE REAL DE GOOGLE: Conectada oficialmente al motor multimedia
        const YOUTUBE_API_KEY = "aizasydqr7beo_3cu5ohbwkf6wmxzjxjllgrr-0"; 

        const CATALOGO_LOCAL = [
            { id: "XW5U8pWJqK4", title: "Soda Stereo - De Música Ligera (Karaoke)", genre: "rock" },
            { id: "M7X9XyVfSgA", title: "Chaqueño Palavecino - Amor Salvaje (Karaoke)", genre: "folclore" },
            { id: "3wVw86mI6N0", title: "Gilda - No me arrepiento de este amor (Karaoke)", genre: "cumbia" }
        ];

        // 🚀 FUNCIÓN RENOMBRADA: Inmune a la memoria vieja del caché
        function ejecutarBusquedaOficial() {
            const input = document.getElementById('search-input');
            const consulta = input.value.trim().toLowerCase();
            const statusBox = document.getElementById('status-box');
            const contenedorResultados = document.getElementById('results');

            if (!consulta) return;
            statusBox.style.display = "none";
            contenedorResultados.innerHTML = "";

            if (!YOUTUBE_API_KEY || YOUTUBE_API_KEY.trim() === "") {
                renderizarResultados(CATALOGO_LOCAL);
            } else {
                // 🛠️ DIRECCIÓN OFICIAL DE GOOGLE ARMADA CON MÁXIMA SEPARACIÓN DE BARRAS
                const urlGoogle = "https://googleapis.com" + encodeURIComponent(consulta + " karaoke") + "&key=" + YOUTUBE_API_KEY;
                
                fetch(urlGoogle)
                    .then(res => res.json())
                    .then(data => {
                        if (data.items && data.items.length > 0) {
                            const formateadas = data.items.map(item => ({
                                id: item.id.videoId,
                                title: item.snippet.title,
                                genre: "YouTube Live"
                            }));
                            renderizarResultados(formateadas);
                        } else {
                            renderizarResultados(CATALOGO_LOCAL);
                        }
                    })
                    .catch(() => {
                        console.log("Desviando a catálogo por error de red externa");
                        renderizarResultados(CATALOGO_LOCAL);
                    });
            }
        }

        function renderizarResultados(lista) {
            const contenedor = document.getElementById('results');
            contenedor.innerHTML = lista.map(track => `
                <div class="track-item" onclick="cargarVideoOficial('${track.id}', '${track.title.replace(/'/g, "\\'")}')">
                    <div class="track-thumb">🎵</div>
                    <div class="track-info">
                        <div class="track-title">${track.title}</div>
                        <div class="track-genre">${track.genre}</div>
                    </div>
                    <div style="color: #a855f7; font-size: 0.9rem;"><i class="fas fa-play"></i></div>
                </div>
            `).join('');
        }

        // 🎯 EMBED MAESTRO NATIVO: Evita por completo los conflictos de constructores
        function cargarVideoOficial(videoId, tituloCancion) {
            const wrapper = document.getElementById('wrapper-video');
            const iframe = document.getElementById('player-iframe');
            const consola = document.getElementById('studio-console');
            const tituloConsole = document.getElementById('console-title');
            
            if (wrapper) wrapper.style.display = 'block';
            if (consola) consola.style.display = 'block';
            if (tituloConsole) tituloConsole.innerText = "🎙️ Grabando para: " + tituloCancion;
            
            // Forzamos el enlace embebido tradicional con separadores explícitos
            iframe.src = "https://youtube.com" + videoId + "?autoplay=1&controls=1&modestbranding=1&rel=0";
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        let grabadoraMultimedia = null;
        let fragmentosAudio = [];
        let estaGrabando = false;

        async function toggleGrabacion() {
            const btn = document.getElementById('rec-btn');
            const statusText = document.getElementById('rec-status');
            const eqLoader = document.getElementById('eq-loader');
            const preview = document.getElementById('audio-preview');
            const linkDescarga = document.getElementById('download-link');

            if (!estaGrabando) {
                try {
                    const flujoMicrofono = await navigator.mediaDevices.getUserMedia({ audio: true });
                    grabadoraMultimedia = new MediaRecorder(flujoMicrofono);
                    fragmentosAudio = [];

                    grabadoraMultimedia.ondataavailable = (e) => {
                        if (e.data.size > 0) fragmentosAudio.push(e.data);
                    };

                    grabadoraMultimedia.onstop = () => {
                        const blobAudio = new Blob(fragmentosAudio, { type: 'audio/mp3' });
                        const urlAudio = URL.createObjectURL(blobAudio);
                        preview.src = urlAudio;
                        preview.style.display = 'block';
                        linkDescarga.href = urlAudio;
                        linkDescarga.download = "Mi_Karaoke_" + Date.now() + ".mp3";
                        linkDescarga.style.display = 'inline-flex';
                        flujoMicrofono.getTracks().forEach(track => track.stop());
                    };

                    grabadoraMultimedia.start();
                    estaGrabando = true;
                    btn.classList.add('recording');
                    btn.innerHTML = '<i class="fas fa-stop"></i>';
                    statusText.innerText = "🔴 GRABANDO TU VOZ... ¡Dale con todo!";
                    statusText.style.color = "#ef4444";
                    eqLoader.style.display = 'flex';
                    preview.style.display = 'none';
                    linkDescarga.style.display = 'none';
                } catch (err) {
                    alert("⚠️ Error: Necesitamos permisos de micrófono en el estudio.");
                }
            } else {
                if (grabadoraMultimedia && grabadoraMultimedia.state !== "inactive") grabadoraMultimedia.stop();
                estaGrabando = false;
                btn.classList.remove('recording');
                btn.innerHTML = '<i class="fas fa-microphone"></i>';
                statusText.innerText = "✅ Grabación finalizada. Escucha tu canción abajo.";
                statusText.style.color = "#22c55e";
                eqLoader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
